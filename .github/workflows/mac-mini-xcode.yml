name: Mac mini Xcode validation

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  validate:
    if: github.event.repository.private == true && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: [self-hosted, macos, xcode, mac-mini]
    timeout-minutes: 45
    concurrency:
      group: mac-mini-${{ github.repository }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v6

      - name: Xcode version
        run: xcodebuild -version

      - name: Validate
        run: ./Scripts/ci/validate.sh

      - name: Upload Xcode result bundles
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcode-results
          path: ${{ runner.temp }}/xcode-results
          if-no-files-found: ignore
